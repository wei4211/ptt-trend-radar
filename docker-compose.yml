version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: pttpassword
      POSTGRES_DB: ptt_radar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptt"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://ptt:pttpassword@db:5432/ptt_radar
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SCRAPE_INTERVAL_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - nlp_cache:/root/.cache

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001

volumes:
  postgres_data:
  nlp_cache:
