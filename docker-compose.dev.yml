version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: pttpassword
      POSTGRES_DB: ptt_radar
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptt"]
      interval: 5s
      timeout: 5s
      retries: 5
